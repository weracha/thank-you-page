<title>Order Confirmed - kpopgurly</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --peach: #F5EAE3;
    --purple: #8B6BB1;
    --purple-light: #C4A8E0;
    --purple-pale: #EDE0F7;
    --pink: #F2C4CE;
    --pink-light: #FAE8EC;
    --text-dark: #3D2B1F;
    --text-mid: #7A5C4E;
    --white: #FFFAF8;
    --shadow: rgba(139,107,177,0.15);
  }

  body {
    min-height: 100vh;
    background: var(--peach);
    font-family: 'Nunito', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  .card {
    background: var(--white);
    border-radius: 28px;
    max-width: 400px;
    width: 100%;
    padding: 40px 28px 44px;
    box-shadow: 0 8px 40px var(--shadow);
    text-align: center;
    opacity: 0;
    transform: translateY(20px);
    animation: cardIn 0.6s cubic-bezier(0.22,1,0.36,1) 0.1s forwards;
  }

  @keyframes cardIn {
    to { opacity: 1; transform: translateY(0); }
  }

  .char-wrap {
    width: 160px;
    height: 160px;
    margin: 0 auto 28px;
    opacity: 0;
    animation: charIn 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.3s forwards;
  }

  @keyframes charIn {
    0% { opacity: 0; transform: scale(0.75); }
    100% { opacity: 1; transform: scale(1); }
  }

  .char-wrap img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    filter: drop-shadow(0 6px 16px rgba(139,107,177,0.2));
  }

  .title {
    font-size: clamp(26px, 7vw, 30px);
    font-weight: 900;
    color: var(--purple);
    letter-spacing: -0.02em;
    opacity: 0;
    animation: fadeUp 0.5s ease 0.55s forwards;
  }

  .subtitle {
    margin-top: 8px;
    font-size: 14.5px;
    font-weight: 600;
    color: var(--text-mid);
    line-height: 1.6;
    opacity: 0;
    animation: fadeUp 0.5s ease 0.7s forwards;
  }

  .spam-box {
    margin-top: 24px;
    background: linear-gradient(135deg, var(--purple-pale), var(--pink-light));
    border-radius: 18px;
    padding: 20px 22px;
    opacity: 0;
    animation: fadeUp 0.5s ease 0.85s forwards;
  }

  .spam-box p {
    font-size: clamp(15px, 4vw, 16px);
    font-weight: 800;
    color: var(--text-dark);
    line-height: 1.6;
  }

  .spam-box p span {
    color: var(--purple);
  }

  @keyframes fadeUp {
    0% { opacity: 0; transform: translateY(12px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .confetti-container {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
    overflow: hidden;
  }

  .confetti-piece {
    position: absolute;
    top: -20px;
    opacity: 0;
    animation: confettiFall linear forwards;
  }

  @keyframes confettiFall {
    0% { opacity: 1; transform: translateY(0) rotate(0deg); }
    85% { opacity: 1; }
    100% { opacity: 0; transform: translateY(110vh) rotate(720deg); }
  }

  @media (max-width: 360px) {
    .card { padding: 32px 18px 36px; }
    .char-wrap { width: 130px; height: 130px; }
  }

  @media (min-width: 768px) {
    .char-wrap { width: 190px; height: 190px; }
    .card { padding: 48px 44px 52px; }
  }
</style>
</head>

<script>
(function() {
  const container = document.getElementById('confetti');
  const colors = ['#C4A8E0','#F2C4CE','#8B6BB1','#F5C6D0','#E8D5F5'];

  function createPiece() {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    const size = 6 + Math.random() * 8;
    const isCircle = Math.random() > 0.5;
    el.style.cssText = [
      'left:' + (Math.random() * 100) + '%',
      'width:' + size + 'px',
      'height:' + size + 'px',
      'background:' + colors[Math.floor(Math.random() * colors.length)],
      'border-radius:' + (isCircle ? '50%' : '2px'),
      'animation-duration:' + (2 + Math.random() * 2.5) + 's',
      'animation-delay:' + (Math.random() * 1.8) + 's'
    ].join(';');
    container.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }

  window.addEventListener('load', () => {
    for (let i = 0; i < 65; i++) createPiece();
  });
})();
</script>
